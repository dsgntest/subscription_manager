  <text x="130" y="500" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="64" font-weight="800" fill="#111827">디지털 사글세</text>
  <text x="130" y="552" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="28" font-weight="500" fill="#4B5563">구독 서비스 월 지출을 한눈에 정리하는 간단한 관리 앱</text>
