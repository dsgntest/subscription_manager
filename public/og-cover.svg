    <text x="394" y="182" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="600" fill="#4B5563">이번 달 총 사글세</text>
    <text x="394" y="231" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="54" font-weight="800" fill="#111827">₩100,800</text>

    <rect x="274" y="286" width="652" height="70" rx="24" fill="#F8FAFC"/>
    <circle cx="319" cy="321" r="21" fill="#CCFF00"/>
    <text x="358" y="329" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="27" font-weight="700" fill="#111827">넷플릭스</text>
    <text x="861" y="329" text-anchor="end" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="700" fill="#111827">₩17,000</text>

    <rect x="274" y="374" width="652" height="70" rx="24" fill="#F8FAFC"/>
    <circle cx="319" cy="409" r="21" fill="#D9FF33"/>
    <text x="358" y="417" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="27" font-weight="700" fill="#111827">유튜브 프리미엄</text>
    <text x="861" y="417" text-anchor="end" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="700" fill="#111827">₩14,900</text>

    <rect x="800" y="286" width="126" height="158" rx="28" fill="#111827"/>
    <text x="863" y="336" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="700" fill="#E5FF66">관리 중</text>
    <text x="863" y="387" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="44" font-weight="800" fill="white">5</text>
    <text x="863" y="420" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" font-weight="600" fill="#CBD5E1">subscriptions</text>
